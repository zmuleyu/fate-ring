<svg xmlns="http://www.w3.org/2000/svg" width="220" height="380" viewBox="0 0 220 380">
  <defs>
    <linearGradient id="bg13" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3a3a0a"/>
      <stop offset="100%" style="stop-color:#7a7a1a"/>
    </linearGradient>
    <linearGradient id="border13" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4af37"/>
      <stop offset="50%" style="stop-color:#ffe87c"/>
      <stop offset="100%" style="stop-color:#d4af37"/>
    </linearGradient>
  </defs>
  <!-- Card background -->
  <rect width="220" height="380" rx="12" fill="url(#bg13)"/>
  <!-- Gold border -->
  <rect x="4" y="4" width="212" height="372" rx="10" fill="none" stroke="url(#border13)" stroke-width="2"/>
  <rect x="10" y="10" width="200" height="360" rx="8" fill="none" stroke="url(#border13)" stroke-width="0.5" opacity="0.5"/>
  <!-- Corner ornaments -->
  <text x="18" y="36" font-size="18" fill="#d4af37" opacity="0.8">✦</text>
  <text x="186" y="36" font-size="18" fill="#d4af37" opacity="0.8">✦</text>
  <text x="18" y="368" font-size="18" fill="#d4af37" opacity="0.8">✦</text>
  <text x="186" y="368" font-size="18" fill="#d4af37" opacity="0.8">✦</text>
  <!-- Card number -->
  <text x="110" y="55" text-anchor="middle" font-size="16" fill="#d4af37" font-family="serif" letter-spacing="3">13</text>
  <!-- Decorative line -->
  <line x1="30" y1="65" x2="190" y2="65" stroke="#d4af37" stroke-width="0.5" opacity="0.6"/>
  <!-- Central symbol -->
  <text x="110" y="220" text-anchor="middle" font-size="80" fill="none" stroke="#d4af37" stroke-width="0.5" opacity="0.3">☠</text>
  <text x="110" y="220" text-anchor="middle" font-size="80" fill="#d4af37" opacity="0.15">☠</text>
  <!-- Decorative circle -->
  <circle cx="110" cy="185" r="70" fill="none" stroke="#d4af37" stroke-width="0.5" opacity="0.3"/>
  <circle cx="110" cy="185" r="55" fill="none" stroke="#d4af37" stroke-width="0.3" opacity="0.2"/>
  <!-- Separator line -->
  <line x1="30" y1="300" x2="190" y2="300" stroke="#d4af37" stroke-width="0.5" opacity="0.6"/>
  <!-- Card name -->
  <text x="110" y="350" text-anchor="middle" font-size="15" fill="#d4af37" font-family="serif">Death</text>
  <!-- Chinese name -->
  <text x="110" y="375" text-anchor="middle" font-size="11" fill="#d4af37" font-family="sans-serif" opacity="0.7">死神</text>
</svg>